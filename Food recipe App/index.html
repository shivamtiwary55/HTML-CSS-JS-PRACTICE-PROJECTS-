<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Recipe App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
 <body class="bg-blue-950 text-white">
    <div class="container my-3 text-center">
      <button id="Italy" type="button" class="btn btn-primary mx-3">
        Italy
      </button>
      <button id="Canadian" type="button" class="btn btn-warning mx-3">
        Canadian
      </button>
      <button id="Australian" type="button" class="btn btn-success mx-3">
        Australian
      </button>
      <button id="Thai" type="button" class="btn btn-danger mx-3">Thai</button>
      <button id="British" type="button" class="btn btn-warning mx-3">
        British
      </button>
      <button id="Russian" type="button" class="btn btn-info mx-3">
        Russian
      </button>
    </div>

    <div class="container text-center margin-bottom: 20px ">
      <input
        type="text"
        id="search"
        title="search"
        placeholder="Choose your food"
      />
    </div>

    <div class="food">

    </div>

    <script src="./index.js"></script>
  </body>
</html>
