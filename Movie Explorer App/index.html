<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="../Movie Explorer App/style.css" />

    <title>Movie Explorer App</title>
  </head>
  <body>
    <h1 class="title">Mazedaar Movies</h1>
    <div class="search-box">
      <input
        type="text"
        id="search"
        title="search"
        placeholder="Search movies"
      />
    </div>

    <div class="buttons">
      <button id="Action" type="button" class="btn btn-primary">Action</button>
      <button id="Comedy" type="button" class="btn btn-secondary">
        Comedy
      </button>
      <button id="Horror" type="button" class="btn btn-success">Horror</button>
      <button id="SciFi" type="button" class="btn btn-danger">Sci-Fi</button>
    </div>

    <div class="movies"></div>
    <script src="../Movie Explorer App/index.js"></script>
  </body>
</html>
