<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <title>Makeup Artist Portfolio</title>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top bg-white shadow-sm ">

    <div class="container">

      <a class="navbar-brand logo" href="#">
        Makup by Narayan
      </a>

      <!-- Mobile Menu -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMenu"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Nav Links -->
      <div class="collapse navbar-collapse" id="navbarMenu">

        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="#home">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#about">About</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#services">Services</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#portfolio">Portfolio</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#book">
              Book Now
            </a>
          </li>

        </ul>

      </div>

    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero-section">

    <div class="container">

      <div class="row align-items-center">

        <!-- Left Side -->
        <div class="col-lg-6 col-md-6 col-12 hero-content">

          <h1>
            Beauty That Enhances Confidence
          </h1>

          <p>
            Professional Bridal & Party Makeup
            Artist creating elegant and timeless looks
            for your special moments.
          </p>

          <div class="hero-buttons">

            <button class="btn custom-btn">
              Book Appointment
            </button>

            <button class="btn btn-outline-dark">
              View Work
            </button>

          </div>

        </div>

        <!-- Right Side -->
        <div class="col-lg-6 col-md-6 col-12 text-center">

          <img
            src="https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?w=800"
            alt="Makeup Artist"
            class="img-fluid hero-image"
          />

        </div>

      </div>

    </div>

  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
